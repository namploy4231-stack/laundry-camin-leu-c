<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEU C | Laundry Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --bg: #f5f6fa; --white: #ffffff; --success: #00b894; --danger: #d63031; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: var(--white); padding: 35px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 850px; text-align: center; }
        .hidden { display: none; }
        h2 { font-weight: 700; letter-spacing: -1px; margin-bottom: 5px; }
        p.subtitle { color: #b2bec3; font-size: 0.9em; margin-bottom: 25px; }
        label { display: block; text-align: left; font-size: 0.75em; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #636e72; }
        select, input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #dfe6e9; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; background: white; }
        .day-nav { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 20px; }
        .day-item { padding: 12px 5px; border: 1px solid #eee; border-radius: 12px; cursor: pointer; background: #fff; transition: 0.2s; font-size: 0.82em; }
        .day-item.active { background: var(--primary); color: white; border-color: var(--primary); }
        .day-item span { display: block; font-size: 0.7em; font-weight: 600; opacity: 0.8; }
        .slots-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 400px; overflow-y: auto; padding: 10px; border: 1px solid #f1f2f6; border-radius: 12px; }
        .slot { padding: 15px; border-radius: 10px; font-size: 0.85em; cursor: pointer; border: 1px solid #eee; background: #f9f9f9; text-align: center; }
        .slot.booked { background: #ffeaa7; color: #d63031; cursor: not-allowed; border: none; }
        .slot.my-booking { background: var(--success); color: white; font-weight: bold; border: none; }
        .slot.selected { border: 2.5px solid var(--accent); background: #e1f5fe; }
        .main-btn { width: 100%; max-width: 350px; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; cursor: pointer; font-weight: 600; font-size: 16px; margin-top: 25px; transition: 0.3s; }
        .main-btn:disabled { background: #b2bec3; cursor: not-allowed; }
        .quota-box { display: flex; justify-content: space-around; background: #f1f2f6; padding: 15px; border-radius: 15px; margin: 20px 0; font-size: 0.85em; }
        #summary-content { text-align: left; background: #f9f9f9; padding: 25px; border-radius: 18px; margin: 25px 0; line-height: 1.8; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <div id="step-1">
        <h2>Cămin LEU C</h2>
        <p class="subtitle">Rezervare Spălătorie / Laundry Booking</p>
        <div style="max-width: 400px; margin: 0 auto; text-align: left;">
            <label>Etaj / Floor</label>
            <select id="floor">
                <option value="UG">Ground floor</option>
                <option value="1">Floor 1</option>
                <option value="2">Floor 2</option>
                <option value="3" selected>Floor 3</option>
            </select>
            <label>Cameră / Room</label>
            <select id="room-select"></select>
            <label>Email Student</label>
            <input type="email" id="email" placeholder="student@example.ro">
            <button class="main-btn" id="go-to-slots" style="max-width: 100%;">Continuați / Continue</button>
        </div>
    </div>

    <div id="step-2" class="hidden">
        <h3 id="display-info" style="color: var(--accent);">--</h3>
        <div class="day-nav" id="day-nav"></div>
        <div class="slots-grid-wrapper">
             <div class="slots-container" id="slots-grid"></div>
        </div>
        <div class="quota-box">
            <div>Email: <b id="u-quota">0/3</b> h</div>
            <div>Cameră: <b id="r-quota">0/6</b> h</div>
        </div>
        <button class="main-btn" id="btn-confirm">Confirmă / Confirm</button>
        <br><button style="background:none; border:none; color:#b2bec3; margin-top:15px; cursor:pointer;" onclick="location.reload()">Înapoi / Back</button>
    </div>

    <div id="step-3" class="hidden">
        <h2 style="color: var(--success);">Finalizat! / Done!</h2>
        <div id="summary-content"></div>
        <button class="main-btn" onclick="location.reload()">Termină / Finish</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBmn-dnQMmnNQCr5eg_-il7QlpuiU6M31E",
        authDomain: "camin-leu-c-laundry.firebaseapp.com",
        projectId: "camin-leu-c-laundry",
        storageBucket: "camin-leu-c-laundry.firebasestorage.app",
        messagingSenderId: "201297705110",
        appId: "1:201297705110:web:e87511ba9278d0c2f82ab7"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const roomRange = { "UG": [1, 26], "1": [101, 127], "2": [201, 229], "3": [301, 329] };
    let curRoom = "", curEmail = "", curDate = "", curSlot = null, isCancelMode = false;

    function updateRoomDropdown() {
        const floor = document.getElementById('floor').value;
        const select = document.getElementById('room-select');
        select.innerHTML = "";
        const [start, end] = roomRange[floor];
        for (let i = start; i <= end; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `Cameră ${i}`;
            select.appendChild(opt);
        }
    }
    document.getElementById('floor').addEventListener('change', updateRoomDropdown);
    updateRoomDropdown();

    document.getElementById('go-to-slots').onclick = async () => {
        curRoom = document.getElementById('room-select').value;
        curEmail = document.getElementById('email').value.toLowerCase().trim();
        if(!curEmail.includes('@')) return alert("Email invalid!");

        // --- เพิ่มระบบเช็กสิทธิ์ 2 อีเมลต่อห้อง ---
        const btn = document.getElementById('go-to-slots');
        btn.disabled = true;
        btn.innerText = "Checking...";

        try {
            const roomRef = doc(db, "room_auth", curRoom);
            const roomSnap = await getDoc(roomRef);
            
            if (roomSnap.exists()) {
                const authorizedEmails = roomSnap.data().emails || [];
                if (authorizedEmails.length >= 2 && !authorizedEmails.includes(curEmail)) {
                    btn.disabled = false;
                    btn.innerText = "Continuați / Continue";
                    return alert("Această cameră are deja 2 utilizatori înregistrați! / This room already has 2 registered users!");
                }
            }
        } catch (e) { console.error(e); }

        btn.disabled = false;
        btn.innerText = "Continuați / Continue";
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        document.getElementById('display-info').innerText = `Cameră ${curRoom} | ${curEmail}`;
        renderCalendar();
    };

    function renderCalendar() {
        const nav = document.getElementById('day-nav'); nav.innerHTML = "";
        const daysRo = ['DUM','LUN','MAR','MIE','JOI','VIN','SÂM'];
        const monthsRo = ['IAN','FEB','MAR','APR','MAI','IUN','IUL','AUG','SEP','OCT','NOI','DEC'];
        const startDate = new Date(2026, 3, 1); 
        
        for(let i=0; i<7; i++){
            let d = new Date(startDate);
            d.setDate(startDate.getDate() + i);
            let dStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            if(i === 0) curDate = dStr;
            let el = document.createElement('div');
            el.className = `day-item ${dStr === curDate ? 'active' : ''}`;
            el.innerHTML = `<span>${daysRo[d.getDay()]}</span><strong>${d.getDate()} ${monthsRo[d.getMonth()]}</strong>`;
            el.onclick = () => {
                curDate = dStr; curSlot = null;
                document.querySelectorAll('.day-item').forEach(item => item.classList.remove('active'));
                el.classList.add('active'); loadSlots();
            };
            nav.appendChild(el);
        }
        loadSlots();
    }

    async function loadSlots() {
        const grid = document.getElementById('slots-grid');
        grid.innerHTML = "Se încarcă...";
        const times = [];
        for(let i=4; i<27; i++){ 
            let h = i % 24; let nh = (i + 1) % 24;
            times.push(`${h.toString().padStart(2,'0')}:00 - ${nh.toString().padStart(2,'0')}:00`);
        }
        
        let rCount = 0, uCount = 0;
        const allDocs = await getDocs(collection(db, "bookings"));
        allDocs.forEach(ds => {
            Object.values(ds.data()).forEach(v => {
                if(v.room == curRoom) rCount++;
                if(v.email == curEmail) uCount++;
            });
        });
        document.getElementById('u-quota').innerText = `${uCount}/3`;
        document.getElementById('r-quota').innerText = `${rCount}/6`;

        const snap = await getDoc(doc(db, "bookings", curDate));
        const data = snap.exists() ? snap.data() : {};
        grid.innerHTML = "";
        times.forEach(t => {
            const b = data[t];
            const isMine = b && b.email === curEmail;
            const el = document.createElement('div');
            el.className = `slot ${b ? (isMine ? 'my-booking' : 'booked') : 'available'}`;
            el.innerHTML = `<b>${t}</b><small>${b ? 'Cameră ' + b.room : 'Liber'}</small>`;
            el.onclick = () => {
                if(b && !isMine) return;
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                el.classList.add('selected'); curSlot = t; isCancelMode = isMine;
                document.getElementById('btn-confirm').innerText = isMine ? "Anulează / Cancel" : "Confirmă / Confirm";
                document.getElementById('btn-confirm').style.background = isMine ? "var(--danger)" : "var(--primary)";
            };
            grid.appendChild(el);
        });
    }

    async function sendEmailDirectly() {
        const data = {
            service_id: 'service_52aeqkm',
            template_id: 'template_arezqpm',
            user_id: 'vjVk_dNaa5h3RxRTd',
            template_params: { to_email: curEmail, room_no: curRoom, date: curDate, time_slot: curSlot }
        };
        try { await fetch('https://api.emailjs.com/api/v1.0/email/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); } catch (e) { console.error(e); }
    }

    document.getElementById('btn-confirm').onclick = async () => {
        if(!curSlot) return alert("Selectați un interval!");
        const btn = document.getElementById('btn-confirm');
        btn.disabled = true;
        try {
            const dRef = doc(db, "bookings", curDate);
            const snap = await getDoc(dRef);
            let currentData = snap.exists() ? snap.data() : {};

            if(isCancelMode) {
                delete currentData[curSlot];
                await setDoc(dRef, currentData);
                showStep3("Anulat / Cancelled", curSlot);
            } else {
                let rCount = 0, uCount = 0;
                const all = await getDocs(collection(db, "bookings"));
                all.forEach(d => { Object.values(d.data()).forEach(v => {
                    if(v.room == curRoom) rCount++;
                    if(v.email == curEmail) uCount++;
                })});
                if(uCount >= 3 || rCount >= 6) { btn.disabled = false; return alert("Limită atinsă!"); }

                // --- บันทึกอีเมลลงใน Whitelist ของห้องเมื่อมีการจองครั้งแรก ---
                const roomRef = doc(db, "room_auth", curRoom);
                const roomSnap = await getDoc(roomRef);
                if (!roomSnap.exists()) {
                    await setDoc(roomRef, { emails: [curEmail] });
                } else {
                    await updateDoc(roomRef, { emails: arrayUnion(curEmail) });
                }

                currentData[curSlot] = { room: curRoom, email: curEmail };
                await setDoc(dRef, currentData);
                await sendEmailDirectly();
                showStep3("Confirmat / Confirmed", curSlot);
            }
        } catch (e) { alert(e.message); }
        btn.disabled = false;
    };

    function showStep3(status, slot) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        document.getElementById('summary-content').innerHTML = `
            <strong>Status:</strong> ${status}<br>
            <strong>Cameră / Room:</strong> ${curRoom}<br>
            <strong>Data / Date:</strong> ${curDate}<br>
            <strong>Interval / Time:</strong> ${slot}<br>
            <strong>Email:</strong> ${curEmail}
        `;
    }
</script>
</body>
</html>
